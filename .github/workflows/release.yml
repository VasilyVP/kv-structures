name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Capture release tag version
        id: release_version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Packages auth
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@vasilyvp'

      - name: Force npm auth config for GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set @vasilyvp:registry https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"

      - name: Verify GitHub Packages authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm whoami --registry=https://npm.pkg.github.com/

      - name: Publish package to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set version="${{ steps.release_version.outputs.version }}"
          npm publish --access public --registry=https://npm.pkg.github.com/

      - name: Configure npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish package to npm
        working-directory: ./packages/redis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm pkg set version="${{ steps.release_version.outputs.version }}"
          npm publish --access public --registry=https://registry.npmjs.org/
